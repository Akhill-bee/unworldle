<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Many Requests - Unwordle</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --subtext-color: #666666;
            --border-color: #e0e0e0;
            --heading-color: #c62828;
        }

        body.dark-mode {
            --bg-color: #121213;
            --card-bg: #1a1a1b;
            --text-color: #ffffff;
            --subtext-color: #a0a0a0;
            --border-color: #3a3a3c;
            --heading-color: #ef5350;
        }

        body { 
            font-family: Arial, sans-serif; 
            max-width: 500px; 
            margin: 80px auto; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            text-align: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 1px solid var(--border-color);
        }

        h1 { 
            margin-top: 0;
            color: var(--heading-color); 
            font-size: 1.8rem;
        }

        p {
            color: var(--subtext-color);
            line-height: 1.5;
            font-size: 1.05rem;
        }

        .btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            background: #2e7d32; 
            color: white; 
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hey! Don't do that please</h1>
        <p>You've submitted too many requests in a short period.</p>
        <p>Please wait a few seconds before refreshing or trying another guess.</p>
        
        <a href="/" class="btn">Try Again</a>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
