<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Many Requests - Unwordle</title>

    <link rel="stylesheet" href="https://home.akhilbee.dev/theme.css">
    <script src="https://home.akhilbee.dev/footer.js" defer></script>

    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center;
            
            /* Flexbox layout to push footer down */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px;
            margin: auto auto; /* Centers the error card vertically and horizontally */
            padding: 20px;
            box-sizing: border-box;
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 1px solid var(--border-color);
        }

        h1 { 
            margin-top: 0;
            font-size: 1.8rem;
        }

        p {
            line-height: 1.5;
            font-size: 1.05rem;
        }

        .btn { 
            padding: 12px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            background: var(--heading-color); 
            color: #ffffff; 
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Forces footer component to span full width and snap to bottom */
        akhilbee-footer {
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="card">
            <h1>Hey! Don't do that please</h1>
            <p>You've submitted too many requests in a short period.</p>
            <p>Please wait a few seconds before refreshing or trying another guess.</p>
            
            <a href="/" class="btn">Try Again</a>
        </div>
    </div>

    <akhilbee-footer></akhilbee-footer>

    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
